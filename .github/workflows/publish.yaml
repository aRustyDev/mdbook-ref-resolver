# Publish to crates.io
#
# This workflow publishes the crate to crates.io when a version tag is pushed.
#
# Setup required:
# 1. Create a GitHub Environment called "crates-io":
#    Settings → Environments → New environment → "crates-io"
#
# 2. Configure environment protection rules (recommended):
#    - Required reviewers: Add yourself or team members
#    - Wait timer: 5 minutes (gives time to cancel mistakes)
#    - Deployment branches: "Selected branches" → Add "main" and "v*" tags
#
# 3. Add the CARGO_REGISTRY_TOKEN secret to the environment:
#    In the "crates-io" environment → Add secret → CARGO_REGISTRY_TOKEN
#    Get token from: https://crates.io/settings/tokens
#
# Usage:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# The workflow will:
#   1. Run all tests and checks
#   2. Wait for environment approval (if configured)
#   3. Publish to crates.io
#   4. Create a GitHub Release

name: Publish to crates.io

on:
  push:
    tags:
      - 'v[0-9]+.*'  # Matches v0.1.0, v1.0.0, v2.0.0-beta.1, etc.

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not actually publish)'
        required: false
        default: true
        type: boolean

# Prevent concurrent publishes
concurrency:
  group: publish
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # First, run all quality checks
  check:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test --all-features

      - name: Build release
        run: cargo build --release

      - name: Verify crate can be packaged
        run: cargo package --list

  # Publish to crates.io using GitHub Environment
  publish:
    name: Publish to crates.io
    needs: check
    runs-on: ubuntu-latest

    # Use the crates-io environment for:
    # - Required approvals before publish
    # - Environment-scoped secrets
    # - Deployment tracking
    environment:
      name: crates-io
      url: https://crates.io/crates/mdbook-ref-resolver

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[0].version')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Verify Cargo.toml version matches tag
        if: github.ref_type == 'tag'
        run: |
          CARGO_VERSION=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[0].version')
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ "$CARGO_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::Version mismatch! Cargo.toml has $CARGO_VERSION but tag is v$TAG_VERSION"
            exit 1
          fi
          echo "Version verified: $CARGO_VERSION"

      - name: Publish to crates.io (dry run)
        if: inputs.dry_run == true
        run: cargo publish --dry-run

      - name: Publish to crates.io
        if: inputs.dry_run != true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      - name: Create GitHub Release
        if: github.ref_type == 'tag' && inputs.dry_run != true
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Post-publish notification (optional)
  notify:
    name: Post-publish
    needs: publish
    runs-on: ubuntu-latest
    if: always() && needs.publish.result == 'success'
    steps:
      - name: Summary
        run: |
          echo "## 🎉 Published successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Crate**: [mdbook-ref-resolver](https://crates.io/crates/mdbook-ref-resolver)" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Docs**: [docs.rs/mdbook-ref-resolver](https://docs.rs/mdbook-ref-resolver)" >> $GITHUB_STEP_SUMMARY
